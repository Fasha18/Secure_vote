<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SecureVote - Panel d'Administration du système de vote électronique">
    <title>SecureVote - Panel d'Administration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ==================== LOGIN PAGE ==================== -->
    <div id="login-page" class="login-page">
        <div class="login-container">
            <div class="login-brand">
                <div class="login-logo">🗳️</div>
                <h1>SecureVote</h1>
                <p>Panel d'Administration</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="login-form">
                <h2>Connexion</h2>
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="admin@securevote.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                    <span>Se connecter</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
                <div id="login-error" class="alert alert-error hidden"></div>
            </form>

            <!-- OTP Form -->
            <form id="otp-form" class="login-form hidden">
                <h2>Vérification OTP</h2>
                <p class="otp-info">Un code a été envoyé à <strong id="otp-email-display"></strong></p>
                <div class="otp-inputs" id="otp-inputs">
                    <input type="text" maxlength="1" class="otp-input" data-index="0" autofocus>
                    <input type="text" maxlength="1" class="otp-input" data-index="1">
                    <input type="text" maxlength="1" class="otp-input" data-index="2">
                    <input type="text" maxlength="1" class="otp-input" data-index="3">
                    <input type="text" maxlength="1" class="otp-input" data-index="4">
                    <input type="text" maxlength="1" class="otp-input" data-index="5">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="otp-btn">
                    <span>Vérifier le code</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
                <button type="button" class="btn btn-ghost btn-full" id="resend-otp-btn">
                    Renvoyer le code
                </button>
                <div id="otp-error" class="alert alert-error hidden"></div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="login-form hidden">
                <h2>Inscription</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-firstname">Prénom</label>
                        <input type="text" id="reg-firstname" placeholder="Amadou" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-lastname">Nom</label>
                        <input type="text" id="reg-lastname" placeholder="Diallo" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-phone">Téléphone</label>
                    <input type="text" id="reg-phone" placeholder="+221771234567" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Mot de passe</label>
                    <input type="password" id="reg-password" placeholder="Min 8 car: Maj+min+chiffre+spécial" required>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="reg-terms" required>
                    <label for="reg-terms">J'accepte les conditions d'utilisation</label>
                </div>
                <button type="submit" class="btn btn-primary btn-full">S'inscrire</button>
                <div id="register-error" class="alert alert-error hidden"></div>
            </form>

            <div class="login-toggle">
                <span id="toggle-register" class="link">Pas de compte ? S'inscrire</span>
                <span id="toggle-login" class="link hidden">Déjà un compte ? Se connecter</span>
            </div>
        </div>
    </div>

    <!-- ==================== DASHBOARD ==================== -->
    <div id="dashboard-page" class="dashboard-layout hidden">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-logo">🗳️</div>
                <div>
                    <h2>SecureVote</h2>
                    <span>Panel d'Administration</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>Tableau de bord</span>
                </a>
                <a href="#" class="nav-item" data-page="elections">
                    <span class="nav-icon">🗳️</span>
                    <span>Élections</span>
                </a>
                <a href="#" class="nav-item" data-page="candidates">
                    <span class="nav-icon">👥</span>
                    <span>Candidats</span>
                </a>
                <a href="#" class="nav-item" data-page="roles">
                    <span class="nav-icon">🔑</span>
                    <span>Gestion des Rôles</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span>Paramètres</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="nav-item logout-btn" id="logout-btn">
                    <span class="nav-icon">🚪</span>
                    <span>Déconnexion</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="page-content">
                <!-- Dynamic page content loaded here -->
            </div>
        </main>
    </div>

    <!-- ==================== MODALS ==================== -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal" id="modal-content">
            <!-- Dynamic modal content -->
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
